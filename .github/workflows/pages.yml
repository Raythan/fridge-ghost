name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # NODE_ENV=production no runner omite devDependencies. npm ci + opcionais do Rollup no Linux
      # quebram sem @rollup/rollup-linux-x64-gnu no lock (npm/cli#4828) — usamos npm install.
      - run: npm install --no-audit --no-fund
        env:
          NODE_ENV: development
      - run: npm run validate-recipes
      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
          NODE_ENV: production
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
