name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # NODE_ENV=production no runner omite devDependencies. npm ci + opcionais do Rollup no Linux
      # quebram sem @rollup/rollup-linux-x64-gnu no lock (npm/cli#4828) — usamos npm install.
      - run: npm install --no-audit --no-fund
        env:
          NODE_ENV: development
      - run: npm run validate-recipes
      # Aviso visível nos logs se o secret tiver nome errado ou não existir (o botão "Enviar mensagem" depende disto).
      - name: Verificar secret Web3Forms (feedback por e-mail)
        run: |
          if [ -z "$KEY" ]; then
            echo "::warning::Secret WEB3FORMS_ACCESS_KEY vazio ou inexistente. Em Settings → Secrets and variables → Actions → Repository secrets, crie WEB3FORMS_ACCESS_KEY com a Access Key da Web3Forms e rode o workflow de novo."
          else
            echo "WEB3FORMS_ACCESS_KEY definido — o build vai embutir o envio de feedback."
          fi
        env:
          KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
          NODE_ENV: production
          VITE_PUBLIC_CANONICAL_ORIGIN: https://${{ github.repository_owner }}.github.io
          VITE_FEEDBACK_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
